services:
  test-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: activia_trace_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d activia_trace_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  test-runner:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@test-db:5432/activia_trace_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@test-db:5432/activia_trace_test
      SECRET_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      ENCRYPTION_KEY: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    depends_on:
      test-db:
        condition: service_healthy
    command: ["python", "-m", "pytest", "--tb=short", "-q"]
